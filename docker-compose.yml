services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_server
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${db}
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    # --- ADD THIS BLOCK ---
    healthcheck:
      # Using $$ passes the variable directly to the container's shell
      # instead of Docker Compose trying to evaluate it first.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - 8080:80
    depends_on:
      - postgres
  api:
    build: .
    #image: ghcr.io/karoljash/stonks-app:latest
    container_name: stock-prediction-api
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # --- UPDATE THIS BLOCK ---
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - stock_storage:/app/storage
    # --- UPDATE THIS COMMAND ---
    command: ./start.sh
  pigallery2:
    image: bpatrik/pigallery2:latest
    container_name: pigallery2
    environment:
      - NODE_ENV=production
    volumes:
      # Map your actual photo folder here
      - stock_storage:/app/data/images:ro
      # This stores the app's config and thumbnails
      - ./pigallery_config:/app/data/config
    ports:
      - 8765:80
    restart: always
  optuna-dashboard:
    image: ghcr.io/optuna/optuna-dashboard:latest
    container_name: optuna-dashboard
    restart: always
    ports:
      - 1234:1234
    # If your DB is also in docker, use 'depends_on' so it starts first
    depends_on:
      postgres:
        condition: service_healthy
    # The command overrides the default arguments
    # Syntax: <storage_url> --host <host> --port <port>
    command: ${DATABASE_URL} --host 0.0.0.0 --port 1234
networks: {}
volumes:
  stock_storage: null
